        have a comprehensive set of tools available for GitHub and Cloudflare operations.
        Here''s a summary organized by category:\n\n## GitHub Repository Management\n-
        **Create/Fork Repositories**: Create new repos, fork existing ones\n- **Branch
        Management**: Create branches, list branches\n- **File Operations**: Create,
        update, delete files; push multiple files in one commit\n\n## GitHub Issues
        & Pull Requests\n- **Issue Management**: Read, create, update issues; add
        comments and reactions\n- **Pull Request Operations**: \n  - Read PR details,
        diffs, files, commits, reviews, comments, check runs\n  - Create and manage
        PRs\n  - Update PR status and branches\n  - Merge pull requests\n- **Code
        Review**: \n  - Request Copilot code reviews\n  - Create, submit, and delete
        reviews\n  - Add review comments and replies\n  - Resolve/unresolve review
        threads\n\n## Code & Search\n- **Code Search**: Fast code search across GitHub
        repositories\n- **Commit Search**: Search commits across repositories\n- **Issue/PR
        Search**: Advanced search for issues and pull requests\n- **User/Repository
        Search**: Find users and repositories\n- **Secret Scanning**: Scan files and
        content for exposed secrets\n\n## GitHub Organization & Teams\n- **Teams**:
        Get team members and user team memberships\n- **Labels**: Retrieve label information\n-
        **Collaborators**: List repository collaborators\n- **Issue Fields & Types**:
        List custom issue fields and supported issue types\n\n## Git Information\n-
        **Commits**: Get commit details and list commits\n- **Tags & Releases**: List
        tags/releases, get specific releases by tag\n- **User Profile**: Get authenticated
        user details\n\n## GitHub Copilot AI Agent\n- **Task Assignment**: Assign
        Copilot to work on issues\n- **Pull Request Creation**: Delegate PR creation
        with Copilot\n- **Job Status**: Check status of Copilot tasks/PRs\n\n## Other\n-
