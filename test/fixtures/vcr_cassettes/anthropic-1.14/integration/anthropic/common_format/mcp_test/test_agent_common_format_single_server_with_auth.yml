        files at once\n\n## Branch Management\n- **List branches** - View all branches
        in a repo\n- **Create branches** - Create new branches from existing ones\n\n##
        Commit Management\n- **List commits** - View commit history with filtering
        options\n- **Get commit details** - Get detailed info about specific commits\n-
        **Search commits** - Find commits across repos by message, author, date, etc.\n\n##
        Issues\n- **Create/update issues** - Create new issues or modify existing
        ones\n- **Read issues** - Get issue details, comments, labels, sub-issues\n-
        **List issues** - Browse issues with filtering and sorting\n- **Search issues**
        - Find issues across repos\n- **Add issue comments** - Comment on issues\n-
        **Sub-issue management** - Add, remove, or reprioritize sub-issues\n\n## Pull
        Requests\n- **Create pull requests** - Create new PRs\n- **Update pull requests**
        - Modify PR title, description, reviewers, state\n- **List pull requests**
        - Browse PRs with filtering\n- **Search pull requests** - Find PRs across
        repos\n- **Read PR details** - Get PR info, diffs, files, commits, reviews,
        comments\n- **Merge pull requests** - Merge PRs with different merge strategies\n-
        **Update PR branch** - Sync PR with latest base branch\n\n## Code Review\n-
        **Request Copilot review** - Get automated code review feedback\n- **Create/submit
        reviews** - Create, submit, or delete PR reviews\n- **Add review comments**
        - Comment on specific lines in PRs\n- **Reply to comments** - Reply to and
        react to PR comments\n- **Resolve/unresolve threads** - Manage review thread
        resolution\n\n## Copilot AI Agent\n- **Assign Copilot to issues** - Delegate
        tasks to the Copilot agent\n- **Create PR with Copilot** - Have Copilot create
        a PR to solve a problem\n- **Check job status** - Monitor Copilot agent task
        progress\n\n## Releases & Tags\n- **List releases** - View all releases\n-
        **Get latest release** - Get the most recent release\n- **Get release by tag**
