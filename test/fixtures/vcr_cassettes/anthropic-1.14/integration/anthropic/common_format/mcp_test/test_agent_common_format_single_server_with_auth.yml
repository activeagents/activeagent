        have access to a comprehensive set of GitHub tools that allow me to interact
        with repositories, pull requests, issues, and more. Here''s a summary of the
        main categories:\n\n## Repository Management\n- **Create repositories** -
        Create new public or private repos\n- **Fork repositories** - Fork existing
        repos to your account\n- **Get file contents** - Read files and directory
        structures\n- **Create/update files** - Add or modify files in repos\n- **Delete
