      string: '{"model":"claude-haiku-4-5-20251001","id":"msg_011CczuJu3JwiZp9iWsaQSWv","type":"message","role":"assistant","content":[{"type":"text","text":"#
        Quantum Computing Basics\n\n## Regular computers use bits\n- Each bit is either
        **0 or 1**\n- All calculations built from these binary choices\n\n## Quantum
        computers use qubits\n- A qubit can be **0, 1, or both simultaneously** (called
        \"superposition\")\n- This is the key difference\n\n## Why it matters\n- A
        regular bit: solves one path at a time\n- A qubit: explores many paths at
        once\n\n**Simple analogy:** Imagine a maze. A regular computer tries one route,
        hits a dead end, backtracks, tries another. A quantum computer walks all routes
        simultaneously and finds the exit faster.\n\n## The catch\n- Qubits are extremely
        fragile and sensitive to interference\n- They \"collapse\" into 0 or 1 when
        measured\n- Currently limited in what problems they can solve better than
        regular computers\n- Need extreme cold to operate (~near absolute zero)\n\n##
        Practical impact (so far)\n- **Good at:** drug discovery, optimization problems,
        cryptography\n- **Not good at:** everything regular computers do (email, video,
        gaming)\n- Still mostly experimental technology\n\n**Bottom line:** They''re
        incredibly fast at specific puzzle-solving tasks, but not replacements for
        your laptop."}],"stop_reason":"end_turn","stop_sequence":null,"stop_details":null,"usage":{"input_tokens":15,"cache_creation_input_tokens":0,"cache_read_input_tokens":0,"cache_creation":{"ephemeral_5m_input_tokens":0,"ephemeral_1h_input_tokens":0},"output_tokens":279,"service_tier":"standard","inference_geo":"not_available"}}'
