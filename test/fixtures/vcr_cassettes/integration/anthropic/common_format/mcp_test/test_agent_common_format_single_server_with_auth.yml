      string: '{"model":"claude-haiku-4-5-20251001","id":"msg_011CczuBMpeZtnsZpeFACHwC","type":"message","role":"assistant","content":[{"type":"text","text":"I
        have a comprehensive set of tools available for interacting with GitHub. Here''s
        an overview organized by category:\n\n## Repository Management\n- **Create
        repositories** - Create new GitHub repositories\n- **Fork repositories** -
        Fork existing repositories to your account or organization\n- **List branches**
        - List branches in a repository\n- **Create branches** - Create new branches\n\n##
        Issue Management\n- **Create/update issues** - Create new issues or update
        existing ones\n- **List issues** - List and filter issues in a repository\n-
        **Search issues** - Search for issues across GitHub\n- **Read issue details**
        - Get issue information, comments, sub-issues, labels, parent issues\n- **Manage
        sub-issues** - Add, remove, or reprioritize sub-issues\n\n## Pull Request
        Management\n- **Create pull requests** - Create new PRs manually\n- **List
        pull requests** - List PRs in a repository\n- **Search pull requests** - Search
        for PRs across GitHub\n- **Read PR details** - Get PR information, diffs,
        files, commits, reviews, comments, check runs, and status\n- **Update pull
        requests** - Update PR title, description, base branch, state, reviewers\n-
        **Update PR branch** - Sync PR branch with latest base branch changes\n- **Merge
        pull requests** - Merge PRs with different merge strategies\n- **PR reviews**
        - Create, submit, or delete reviews; resolve/unresolve review threads\n- **Review
        comments** - Add comments to pending reviews and reply to existing comments\n\n##
        Copilot Agent Tasks\n- **Assign Copilot to issues** - Have Copilot work on
        issues to create PRs\n- **Create PRs with Copilot** - Delegate coding tasks
        to Copilot for background implementation\n- **Request Copilot review** - Get
        automated code review feedback on PRs\n- **Check Copilot job status** - Track
        the status of Copilot agent tasks\n\n## File Management\n- **Create/update
        files** - Create or update individual files in a repository\n- **Push files**
        - Push multiple files in a single commit\n- **Delete files** - Delete files
        from a repository\n- **Get file contents** - Read file or directory contents\n\n##
        Commits & History\n- **List commits** - List commits in a repository (with
        filtering by author, path, date)\n- **Get commit details** - Get detailed
        information about specific commits\n- **Search commits** - Search for commits
        across GitHub\n\n## Tags & Releases\n- **List tags** - List git tags in a
        repository\n- **Get tag details** - Get information about specific tags\n-
        **List releases** - List releases in a repository\n- **Get release details**
        - Get information about specific releases\n\n## User & Team Information\n-
        **Get authenticated user** - Get details about your own profile\n- **Get teams**
        - Get teams you''re a member of\n- **Get team members** - Get members of a
        specific team\n- **Search users** - Search for GitHub users\n- **List collaborators**
