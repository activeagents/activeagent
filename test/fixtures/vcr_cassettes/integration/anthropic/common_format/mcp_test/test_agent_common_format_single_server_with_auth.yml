      string: '{"model":"claude-haiku-4-5-20251001","id":"msg_011Cd143mWWHSFdHdsFFBRC7","type":"message","role":"assistant","content":[{"type":"text","text":"I
        have a comprehensive set of tools for working with GitHub repositories. Here''s
        an overview of what I can do:\n\n## Repository Management\n- **Create repositories**
        - Create new public or private repos\n- **Fork repositories** - Fork existing
        repos to your account or organization\n- **List branches, commits, tags, and
        releases** - Browse repository history and structure\n- **Get file contents**
        - Read files and directory structures from repos\n\n## Issue Management\n-
        **Create and update issues** - Create new issues or modify existing ones\n-
        **Read issue details** - Get issue information, comments, labels, sub-issues,
        and parent issues\n- **Search issues** - Find issues across GitHub using advanced
        search syntax\n- **Add comments and reactions** - Comment on issues and add
        emoji reactions\n- **Manage sub-issues** - Add, remove, or reprioritize sub-issues
        under parent issues\n\n## Pull Request Management\n- **Create pull requests**
        - Create PRs with customizable settings\n- **List and search pull requests**
        - Find and browse pull requests\n- **Read PR details** - Get PR information,
        diffs, commits, files changed, and reviews\n- **Update pull requests** - Modify
        PR title, description, state, reviewers, etc.\n- **Merge pull requests** -
        Merge PRs using different merge methods (merge, squash, rebase)\n- **Update
        PR branch** - Sync PR branch with the latest base branch changes\n\n## Code
        Review\n- **Create and manage reviews** - Create reviews, submit pending reviews,
        delete reviews\n- **Add review comments** - Comment on specific lines of code
        in pull requests\n- **Reply to PR comments** - Add reactions and replies to
        PR comments\n- **Resolve/unresolve review threads** - Manage review thread
        status\n- **Request Copilot review** - Get automated code review from GitHub
        Copilot\n\n## Code Changes\n- **Create/update files** - Create new files or
        update existing ones in repos\n- **Delete files** - Remove files from repos\n-
        **Push multiple files** - Commit multiple files in a single commit\n- **Create
        branches** - Create new branches in repos\n\n## Advanced Features\n- **GitHub
        Copilot Agent** - Assign tasks to Copilot to create PRs with implementations\n-
        **Search code** - Fast code search across GitHub repos\n- **Search commits**
        - Find commits by message, author, date, etc.\n- **Search repositories** -
        Find repos by name, description, topics, etc.\n- **Search users** - Find GitHub
        users by username or profile info\n- **Secret scanning** - Scan files for
        leaked credentials and secrets\n- **Get team members** - List members of GitHub
        teams\n- **Get authenticated user info** - Retrieve your own GitHub profile
        information\n\n## Utility Functions\n- **Get commit details** - Get detailed
        information about specific commits\n- **Get labels** - Retrieve label information
        from repositories\n- **Get releases and tags** - Find specific releases or
