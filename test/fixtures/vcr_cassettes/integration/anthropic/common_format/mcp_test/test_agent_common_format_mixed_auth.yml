        have a comprehensive set of tools available for working with GitHub and Cloudflare.
        Here''s what I can do:\n\n## **GitHub Tools**\n\n### Repository Management\n-
        **Create repositories** - Create new GitHub repositories (public or private)\n-
        **Fork repositories** - Fork existing repositories to your account or organization\n-
        **List branches** - View branches in a repository\n- **List tags** - View
        git tags in a repository\n- **List releases** - View releases in a repository\n\n###
        File Operations\n- **Create/update files** - Create or update individual files
        in a repository\n- **Delete files** - Delete files from a repository\n- **Push
        files** - Push multiple files in a single commit\n- **Get file contents**
        - Retrieve file or directory contents\n\n### Issues Management\n- **Create/update
        issues** - Create new issues or update existing ones\n- **Read issues** -
        Get issue details, comments, labels, sub-issues, and parent issues\n- **List
        issues** - List and filter issues in a repository\n- **Search issues** - Search
        for issues across repositories\n- **Add comments to issues** - Add comments
        or reactions to issues\n- **Sub-issue management** - Add, remove, or reprioritize
        sub-issues\n\n### Pull Requests\n- **Create pull requests** - Create new PRs
        manually\n- **Get PR details** - View PR information, diffs, files, commits,
        reviews, comments, and check runs\n- **List pull requests** - List and filter
        PRs in a repository\n- **Search pull requests** - Search for pull requests
        across repositories\n- **Update pull requests** - Modify PR title, description,
        base branch, state, reviewers\n- **Update PR branch** - Sync PR branch with
        latest base branch changes\n- **Merge pull requests** - Merge PRs with different
        merge strategies\n- **Request Copilot review** - Get automated code review
        on PRs\n\n### Pull Request Reviews\n- **Create/submit reviews** - Create reviews
        or submit pending reviews\n- **Delete pending reviews** - Remove pending reviews\n-
        **Add review comments** - Add comments to specific lines in PRs\n- **Reply
        to PR comments** - Reply to or react to pull request comments\n- **Resolve/unresolve
        threads** - Manage review thread resolution\n\n### Copilot Coding Agent\n-
        **Assign Copilot to issues** - Delegate tasks to Copilot agent\n- **Create
        PR with Copilot** - Have Copilot create a PR to solve a problem\n- **Check
        Copilot job status** - Track Copilot agent progress\n\n### Commits & History\n-
        **Get commit details** - View commit information and changes\n- **List commits**
        - View commit history with filtering options\n- **Search commits** - Search
        for commits across repositories\n\n### Team & User Management\n- **Get authenticated
        user** - Retrieve your GitHub profile information\n- **Get team members**
        - List members of a GitHub team\n- **Get user teams** - List teams you''re
        a member of\n- **List collaborators** - View repository collaborators\n- **Search
        users** - Find GitHub users\n\n### Code Search\n- **Search code** - Fast code
        search across repositories\n- **Search repositories** - Find repositories
        by name, description, topics, etc.\n\n### Labels & Metadata\n- **Get labels**
        - Retrieve specific label information\n- **List issue fields** - Get custom
