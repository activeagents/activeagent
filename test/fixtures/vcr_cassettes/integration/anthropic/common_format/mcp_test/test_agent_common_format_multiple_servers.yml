        **List issue fields** - Get custom field definitions\n- **List issue types**
        - Get supported issue types\n\n### Pull Requests\n- **Create pull requests**
        - Create new PRs\n- **Update pull requests** - Modify PR titles, descriptions,
        base branches, etc.\n- **Update PR branch** - Sync PR with latest base branch
        changes\n- **List pull requests** - List PRs with filtering\n- **Search pull
        requests** - Search across pull requests\n- **Get PR details** - Get PR information
        including diffs, status, files, commits, reviews, and check runs\n- **Merge
        pull requests** - Merge PRs with different merge strategies\n- **Request Copilot
        review** - Get automated code review feedback\n\n### Pull Request Reviews\n-
        **Create/submit reviews** - Create and submit pull request reviews\n- **Add
        review comments** - Add comments to specific lines in PR diffs\n- **Add reply
        to review comments** - Reply to existing review comments\n- **Resolve/unresolve
        threads** - Manage review thread status\n\n### Copilot Integration\n- **Assign
        Copilot to issue** - Have Copilot work on specific issues\n- **Create PR with
        Copilot** - Delegate tasks to Copilot for pull request creation\n- **Get Copilot
        job status** - Check status of Copilot tasks\n\n### Code & Search\n- **Search
